name: MHTML ذخیره صفحه به

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      title:
        description: 'Optional title for the output file (no spaces/special chars)'
        required: false
        type: string

      output_folder:
        description: 'Output folder (relative to repo root)'
        required: false
        type: string
        default: 'downloads'

      upload_method:
        description: 'Upload method: repository (push to repo), release (GitHub Releases), or temp_branch'
        required: false
        type: choice
        options:
          - repository
          - release
          - temp_branch
        default: 'repository'

      release_tag:
        description: 'Release tag name (only used when upload_method = release)'
        required: false
        type: string
        default: ''

      branch_name:
        description: 'Temporary branch name (internal use only)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Create or checkout temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          # Since branch_name is always unique (temp-run-{run_id}), no fetch needed
          git checkout -b "${{ github.event.inputs.branch_name }}"
          git push -u origin "${{ github.event.inputs.branch_name }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyppeteer

      - name: Run MHTML downloader
        run: |
          python save_as_mhtml.py \
            --url "${{ github.event.inputs.url }}" \
            ${GITHUB_ACTOR:+--title "${{ github.event.inputs.title }}"} \
            --output-dir "${{ github.event.inputs.output_folder }}"

      - name: Commit and push download folder to repo
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add ${{ github.event.inputs.output_folder }}/
          git commit -m "Add MHTML archive for ${{ github.event.inputs.url }}" || echo "No changes to commit"
          for push_attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Commit and push to temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add ${{ github.event.inputs.output_folder }}/
          git commit -m "Add MHTML archive for ${{ github.event.inputs.url }}" || echo "No changes to commit"
          for push_attempt in 1 2 3; do
            if git push origin "${{ github.event.inputs.branch_name }}"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('mhtml-{0}', github.run_number) }}
          name: "MHTML Archive"
          body: |
            Web page archived as MHTML

            URL: ${{ github.event.inputs.url }}

            Powered by Meli-Action ⚡
          files: ${{ github.event.inputs.output_folder }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
