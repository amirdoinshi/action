name: Cleanup Single Run

on:
  workflow_dispatch:
    inputs:
      run_folder:
        description: 'Run folder to delete (e.g. downloads/run_abc123)'
        required: true
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Delete run folder
        run: |
          FOLDER="${{ inputs.run_folder }}"
          
          # Safety check: only delete folders matching downloads/run_* pattern
          if [[ ! "$FOLDER" =~ ^downloads/run_[a-f0-9]+$ ]]; then
            echo "❌ ERROR: Invalid folder pattern. Must be downloads/run_XXXXXXXX"
            echo "   Got: $FOLDER"
            exit 1
          fi
          
          if [ -d "$FOLDER" ]; then
            echo "🗑️ Deleting: $FOLDER"
            rm -rf "$FOLDER"
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            
            if [[ -n $(git status -s) ]]; then
              git commit -m "🧹 Cleanup $FOLDER [skip ci]"
              git push
              echo "✅ Cleanup complete"
            else
              echo "⚠️ No changes to commit"
            fi
          else
            echo "⚠️ Folder not found: $FOLDER (already cleaned?)"
          fi
