name: "SoundCloud Downloader"

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: "SoundCloud URL"
        required: true
        type: string

      output_format:
        description: "Output Format"
        required: true
        type: choice
        options:
          - mp3
          - flac
        default: mp3

      audio_quality:
        description: "Audio Quality"
        required: true
        type: choice
        options:
          - 128k
          - 192k
          - 320k
        default: 320k

      max_part_mb:
        description: "Max Part Size (MB)"
        required: false
        type: string
        default: "90"

      upload_method:
        description: "Upload Method"
        required: true
        type: choice
        options:
          - repository
          - release
          - temp_branch
        default: repository

      release_tag:
        description: "Release Tag"
        required: false
        type: string
        default: ""

      branch_name:
        description: "Temporary branch name (internal use only)"
        required: false
        type: string
        default: ""

      output_folder:
        description: 'Output folder (relative to repo root)'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  media-download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Create or checkout temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          # Since branch_name is always unique (temp-run-{run_id}), no fetch needed
          git checkout -b "${{ github.event.inputs.branch_name }}"
          git push -u origin "${{ github.event.inputs.branch_name }}"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ytdlp
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache ffmpeg static build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-7.1

      - name: Install ffmpeg (static build)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          sudo cp /tmp/ffmpeg-*-static/ffmpeg /usr/local/bin/
          sudo cp /tmp/ffmpeg-*-static/ffprobe /usr/local/bin/
          ffprobe -version | head -1

      - name: Cache & install apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: curl jq zip python3 python3-pip
          version: '1.0'

      - name: Install pip packages
        shell: bash
        run: |
          pip3 install --quiet yt-dlp

      - name: Create Download Folder
        shell: bash
        run: |
          mkdir -p release_files

      - name: Download SoundCloud Media
        shell: bash
        run: |
          URL="${{ github.event.inputs.media_url }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.audio_quality }}"

          echo "SoundCloud detected"

          yt-dlp \
            --ffmpeg-location /usr/local/bin \
            -x \
            --audio-format "$FORMAT" \
            --audio-quality "$QUALITY" \
            -o "release_files/%(title)s.%(ext)s" \
            "$URL"

      - name: Validate Download
        shell: bash
        run: |
          FILE_COUNT=$(find release_files -type f | wc -l)

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No files downloaded"
            exit 1
          fi

          echo "Downloaded files:"
          ls -lh release_files/

      - name: Split Large Files (repository/temp_branch mode)
        if: github.event.inputs.upload_method == 'repository' || github.event.inputs.upload_method == 'temp_branch'
        shell: bash
        run: |
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          cd release_files || exit 1

          for FILE in *; do
            [ -f "$FILE" ] || continue

            FILESIZE=$(stat -c%s "$FILE")
            THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

            if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
              echo "Splitting: $FILE"

              BASE="${FILE%.*}"

              zip -r -s "${THRESH_MB}m" "${BASE}.zip" "./$FILE"

              rm -f "$FILE"
            fi
          done

          cd ..

      - name: Split Large Files (release mode — >2 GB)
        if: github.event.inputs.upload_method == 'release'
        shell: bash
        run: |
          LIMIT_BYTES=$((2 * 1024 * 1024 * 1024))

          cd release_files || exit 1

          for FILE in *; do
            [ -f "$FILE" ] || continue

            FILESIZE=$(stat -c%s "$FILE")

            if [ "$FILESIZE" -gt "$LIMIT_BYTES" ]; then
              echo "Splitting $FILE ($(( FILESIZE / 1024 / 1024 )) MB) into 2 GB parts..."
              split -b 2048m -d -a 3 "$FILE" "${FILE}."
              rm -f "$FILE"
            fi
          done

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0

          mkdir -p "${{ github.event.inputs.output_folder }}"

          mv release_files/* ${{ github.event.inputs.output_folder }}/ || true

          git add ${{ github.event.inputs.output_folder }}/

          git commit -m "SoundCloud Download [skip ci]" || echo "Nothing to commit"

          for push_attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Push to Temporary Branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0

          mkdir -p "${{ github.event.inputs.output_folder }}"

          mv release_files/* ${{ github.event.inputs.output_folder }}/ || true

          git add ${{ github.event.inputs.output_folder }}/

          git commit -m "SoundCloud Download [skip ci]" || echo "Nothing to commit"

          for push_attempt in 1 2 3; do
            if git push origin "${{ github.event.inputs.branch_name }}"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('soundcloud-{0}', github.run_number) }}
          name: "SoundCloud Download"
          body: |
            SoundCloud Download Complete

            URL: ${{ github.event.inputs.media_url }}
            Format: ${{ github.event.inputs.output_format }}
            Quality: ${{ github.event.inputs.audio_quality }}
            Downloaded on: ${{ steps.get_date.outputs.date }}

            Powered by Meli-Action ⚡
          files: release_files/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf release_files
