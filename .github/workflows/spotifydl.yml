name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      spotify_url:
        description: 'Spotify URL (track, album, or playlist)'
        required: true
        type: string
      output_format:
        description: 'Audio format'
        required: false
        type: choice
        options: ['mp3', 'flac', 'm4a', 'opus']
        default: 'mp3'
      audio_quality:
        description: 'Bitrate (kbps)'
        required: false
        type: choice
        options: ['320', '256', '192', '128']
        default: '320'
      output_folder:
        description: 'Output folder (relative to repo root)'
        required: false
        type: string
        default: 'downloads'
      upload_method:
        description: 'Upload method'
        required: false
        type: choice
        options: ['repository', 'release', 'temp_branch']
        default: 'repository'
      release_tag:
        description: 'Release tag (upload_method = release only)'
        required: false
        type: string
        default: ''
      branch_name:
        description: 'Temp branch name (upload_method = temp_branch only) – leave empty for auto-generation (run_<run_id>)'
        required: false
        type: string
        default: ''
      max_part_mb:
        description: 'Split files larger than N MB (0 = no split)'
        required: false
        type: number
        default: 90
      compress:
        description: 'Compress oversized files before splitting'
        required: false
        type: boolean
        default: false
      cookies:
        description: 'YouTube cookies (Netscape format)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  spotify-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Determine branch name (auto‑generate if empty)
        id: branch
        run: |
          if [ -z "${{ github.event.inputs.branch_name }}" ]; then
            BRANCH="run_${{ github.run_id }}"
            echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT
            echo "Auto‑generated branch name: $BRANCH"
          else
            echo "branch_name=${{ github.event.inputs.branch_name }}" >> $GITHUB_OUTPUT
            echo "Using provided branch name: ${{ github.event.inputs.branch_name }}"
          fi

      - name: Create or checkout temporary branch
        if: github.event.inputs.upload_method == 'temp_branch'
        run: |
          BRANCH="${{ steps.branch.outputs.branch_name }}"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "✅ Created and pushed branch: $BRANCH"

      - name: Create output directory
        run: mkdir -p "${{ github.event.inputs.output_folder }}"

      - name: Cache npm (bgutil)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-bgutil-v1.3.1

      - name: Cache ffmpeg static build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-7.1

      - name: Install ffmpeg (static build)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            -o /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          sudo cp /tmp/ffmpeg-*-static/ffmpeg /usr/local/bin/
          sudo cp /tmp/ffmpeg-*-static/ffprobe /usr/local/bin/
          ffprobe -version | head -1

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          sudo cp "$HOME/.deno/bin/deno" /usr/local/bin/deno
          deno --version

      - name: Install Warp CLI (Cloudflare)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt update -qq && sudo apt install -y -qq cloudflare-warp

      - name: Cache Warp registration
        uses: actions/cache@v4
        with:
          path: /tmp/warp-reg-cache
          key: warp-reg-v1

      - name: Start Warp proxy
        run: |
          sudo systemctl start warp-svc
          sleep 2

          if [ -d /tmp/warp-reg-cache ] && [ "$(ls -A /tmp/warp-reg-cache 2>/dev/null)" ]; then
            sudo cp -r /tmp/warp-reg-cache/. /var/lib/cloudflare-warp/
            echo "✅ Restored cached WARP registration"
          fi

          warp-cli registration new --accept-tos || true
          warp-cli tunnel protocol set MASQUE
          warp-cli mode proxy
          warp-cli proxy port 40000
          warp-cli connect
          sleep 3
          curl -s --max-time 5 --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'warp|ip'

      - name: Install apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: zip nodejs npm curl python3-pip
          version: 1.0

      - name: Install tools
        run: |
          pip install -q -U "yt-dlp[default]" spotdl mutagen spotipy

      - name: Prepare cookies
        run: |
          if [ -n "$INPUT_COOKIES" ]; then
            printf '%s' "$INPUT_COOKIES" > /tmp/cookies.txt
            echo "HAVE_COOKIES=true" >> $GITHUB_ENV
            echo "✅ Using inline cookies ($(wc -l < /tmp/cookies.txt) lines)"
          elif [ -n "$SECRET_YT_COOKIES" ]; then
            printf '%s' "$SECRET_YT_COOKIES" > /tmp/cookies.txt
            echo "HAVE_COOKIES=true" >> $GITHUB_ENV
            echo "✅ Using YT_COOKIES secret ($(wc -l < /tmp/cookies.txt) lines)"
          else
            echo "HAVE_COOKIES=false" >> $GITHUB_ENV
            echo "::warning::No cookies provided — bot-detection may block downloads"
          fi
        env:
          INPUT_COOKIES: ${{ github.event.inputs.cookies }}
          SECRET_YT_COOKIES: ${{ secrets.YT_COOKIES }}

      - name: Download with spotdl
        run: |
          export SPOTIPY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}"
          export SPOTIPY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}"

          YTDLP_ARGS="--extractor-args youtube:player_client=web_music,web,tv,android,ios --js-runtimes deno --proxy socks5://127.0.0.1:40000"
          if [ "$HAVE_COOKIES" = "true" ]; then
            YTDLP_ARGS="$YTDLP_ARGS --cookies /tmp/cookies.txt"
          fi

          spotdl download \
            "${{ github.event.inputs.spotify_url }}" \
            --client-id "${{ secrets.SPOTIFY_CLIENT_ID }}" \
            --client-secret "${{ secrets.SPOTIFY_CLIENT_SECRET }}" \
            --format "${{ github.event.inputs.output_format }}" \
            --bitrate "${{ github.event.inputs.audio_quality }}k" \
            --ffmpeg /usr/local/bin/ffmpeg \
            --output "${{ github.event.inputs.output_folder }}/{list-position} - {artists} - {title}.{output-ext}" \
            --yt-dlp-args "$YTDLP_ARGS"

      - name: Fail if no audio files were downloaded
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          count=$(find . -maxdepth 1 -type f \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.opus" \) | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No audio files downloaded. Track may not be available on YouTube or is region-restricted."
            exit 1
          fi
          echo "✅ Downloaded $count audio file(s)."

      - name: Stop Warp proxy
        if: always()
        run: |
          warp-cli disconnect || true
          sudo systemctl stop warp-svc || true
          sudo mkdir -p /tmp/warp-reg-cache
          sudo cp -r /var/lib/cloudflare-warp/. /tmp/warp-reg-cache/
          sudo chown -R "$USER:$USER" /tmp/warp-reg-cache 2>/dev/null || true
          echo "✅ WARP registration cached for next run"

      - name: Fetch collection metadata from Spotify API
        if: contains(github.event.inputs.spotify_url, 'spotify.com') && (contains(github.event.inputs.spotify_url, '/playlist/') || contains(github.event.inputs.spotify_url, '/album/'))
        env:
          SPOTIFY_URL: ${{ github.event.inputs.spotify_url }}
          OUTPUT_FOLDER: ${{ github.event.inputs.output_folder }}
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          python3 << 'EOF'
          import os, re, json, sys
          import spotipy
          from spotipy.oauth2 import SpotifyClientCredentials

          url = os.environ["SPOTIFY_URL"]
          folder = os.environ["OUTPUT_FOLDER"]

          try:
              sp = spotipy.Spotify(auth_manager=SpotifyClientCredentials(
                  client_id=os.environ["SPOTIPY_CLIENT_ID"],
                  client_secret=os.environ["SPOTIPY_CLIENT_SECRET"],
              ))

              info = None

              # Handles open.spotify.com, spotify.com, and mobile/share links
              playlist_match = re.search(r"spotify\.com/playlist/([A-Za-z0-9]+)", url)
              album_match = re.search(r"spotify\.com/album/([A-Za-z0-9]+)", url)

              if playlist_match:
                  pid = playlist_match.group(1)
                  # Full playlist object — no `fields` filter (it can return a
                  # partial response where `tracks` is missing, which triggers
                  # downstream KeyErrors in spotipy).
                  pl = sp.playlist(pid)
                  owner = pl.get("owner") or {}
                  info = {
                      "type": "playlist",
                      "name": pl.get("name", "Unknown Playlist"),
                      "owner": owner.get("display_name", ""),
                      "description": pl.get("description", "") or "",
                      "url": url,
                  }
              elif album_match:
                  aid = album_match.group(1)
                  al = sp.album(aid)
                  info = {
                      "type": "album",
                      "name": al["name"],
                      "artist": ", ".join(a["name"] for a in al.get("artists", [])),
                      "total_tracks": al.get("total_tracks", 0),
                      "year": (al.get("release_date") or "")[:4],
                      "url": url,
                  }

              if info:
                  out_path = os.path.join(folder, "_collection.info.json")
                  with open(out_path, "w", encoding="utf-8") as f:
                      json.dump(info, f, indent=2, ensure_ascii=False)
                  print(f"✅ Collection metadata written: {info['type']} - {info['name']}")
              else:
                  print("ℹ️  No collection metadata (single track or unsupported URL).")

          except Exception as e:
              print(f"⚠️  Failed to fetch collection metadata: {e}", file=sys.stderr)
              # Still write a minimal file so downstream steps see the failure but don't break.
              with open(os.path.join(folder, "_collection.info.json"), "w", encoding="utf-8") as f:
                  json.dump({"type": "unknown", "error": str(e)}, f, indent=2)
          EOF

      - name: Extract metadata using mutagen (robust for all formats)
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          python3 << 'EOF'
          import os, json
          import mutagen
          from mutagen.easyid3 import EasyID3
          from mutagen.flac import FLAC
          from mutagen.mp4 import MP4
          from mutagen.oggopus import OggOpus

          audio_exts = {'.mp3': 'mp3', '.flac': 'flac', '.m4a': 'm4a', '.opus': 'opus'}

          def get_tags_m4a(filepath):
              tags = MP4(filepath)
              def get(key):
                  return tags.get(key, [''])[0] if tags.get(key) else ''
              return {
                  'title': get('\xa9nam'),
                  'artist': get('\xa9ART'),
                  'album': get('\xa9alb'),
                  'genre': get('\xa9gen'),
                  'year': get('\xa9day')[:4],
              }

          def get_tags_mp3(filepath):
              try:
                  tags = EasyID3(filepath)
              except:
                  return {}
              return {
                  'title': tags.get('title', [''])[0],
                  'artist': tags.get('artist', [''])[0],
                  'album': tags.get('album', [''])[0],
                  'genre': tags.get('genre', [''])[0],
                  'year': tags.get('date', [''])[0][:4] if tags.get('date') else '',
              }

          def get_tags_flac(filepath):
              tags = FLAC(filepath)
              return {
                  'title': tags.get('title', [''])[0] if tags.get('title') else '',
                  'artist': tags.get('artist', [''])[0] if tags.get('artist') else '',
                  'album': tags.get('album', [''])[0] if tags.get('album') else '',
                  'genre': tags.get('genre', [''])[0] if tags.get('genre') else '',
                  'year': tags.get('date', [''])[0][:4] if tags.get('date') else '',
              }

          def get_tags_opus(filepath):
              tags = OggOpus(filepath)
              # OggOpus doesn't have easy tag access, fallback to filename
              return {}

          for f in os.listdir('.'):
              ext = os.path.splitext(f)[1].lower()
              if ext not in audio_exts:
                  continue
              filepath = f
              tags = {}
              if ext == '.mp3':
                  tags = get_tags_mp3(filepath)
              elif ext == '.flac':
                  tags = get_tags_flac(filepath)
              elif ext == '.m4a':
                  tags = get_tags_m4a(filepath)
              elif ext == '.opus':
                  tags = get_tags_opus(filepath)

              # Fallback to filename parsing if critical fields missing
              base = os.path.splitext(f)[0]
              if ' - ' in base:
                  parts = base.split(' - ', 1)
                  if not tags.get('artist') and len(parts) >= 1:
                      tags['artist'] = parts[0].strip()
                  if not tags.get('title') and len(parts) >= 2:
                      tags['title'] = parts[1].strip()
              if not tags.get('title'):
                  tags['title'] = base
              if not tags.get('artist'):
                  tags['artist'] = 'Unknown Artist'

              # Duration
              audio = mutagen.File(filepath)
              duration = int(audio.info.length) if audio and hasattr(audio.info, 'length') else 0

              info = {
                  'title': tags.get('title', ''),
                  'artist': tags.get('artist', ''),
                  'album': tags.get('album', ''),
                  'genre': tags.get('genre', ''),
                  'year': tags.get('year', ''),
                  'duration': duration,
              }
              with open(f + '.info.json', 'w') as jf:
                  json.dump(info, jf, indent=2)
              print(f"✅ Metadata for {f}: {info['artist']} - {info['title']}")
          EOF

      - name: Extract cover art (only one, clean extras)
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          rm -f cover.jpg cover.png
          AUDIO_FILE=$(find . -maxdepth 1 -type f \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.opus" \) | sort -V | head -1)
          if [ -n "$AUDIO_FILE" ]; then
            /usr/local/bin/ffmpeg -i "$AUDIO_FILE" -an -vcodec copy cover.jpg -y 2>/dev/null || \
            /usr/local/bin/ffmpeg -i "$AUDIO_FILE" -an -vcodec png cover.png -y 2>/dev/null || true
            if [ -f cover.jpg ]; then
              BASE=$(basename "$AUDIO_FILE" | sed 's/\.[^.]*$//')
              mv cover.jpg "${BASE}_cover.jpg"
            elif [ -f cover.png ]; then
              BASE=$(basename "$AUDIO_FILE" | sed 's/\.[^.]*$//')
              mv cover.png "${BASE}_cover.png"
            fi
          fi

      - name: Debug summary
        if: always()
        run: |
          echo "=== Downloaded files ==="
          find "${{ github.event.inputs.output_folder }}" -type f | sort | while read f; do
            echo "  $(du -sh "$f" | cut -f1)  $f"
          done
          echo "=== Tool versions ==="
          yt-dlp --version
          spotdl --version

      - name: Split oversized files (repository/temp_branch mode)
        if: (github.event.inputs.upload_method == 'repository' || github.event.inputs.upload_method == 'temp_branch') && github.event.inputs.max_part_mb != '0'
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          THRESH_MB=${{ github.event.inputs.max_part_mb }}
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          COMPRESS="${{ github.event.inputs.compress }}"

          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$THRESH_BYTES" -gt 0 ] && [ "$fs" -gt "$THRESH_BYTES" ]; then
              if [ "$COMPRESS" = "true" ]; then
                zip -j -s "${THRESH_MB}m" "$OUTPUT_FOLDER/${fname}.zip" "$f"
              else
                split -b "${THRESH_MB}m" -d -a 3 "$f" "$OUTPUT_FOLDER/${fname}."
              fi
              rm "$f"
            fi
          done

      - name: Split oversized files (release mode — >2 GB)
        if: github.event.inputs.upload_method == 'release'
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          LIMIT_BYTES=$((2 * 1024 * 1024 * 1024))

          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$fs" -gt "$LIMIT_BYTES" ]; then
              echo "Splitting $fname ($(( fs / 1024 / 1024 )) MB) into 2 GB parts..."
              split -b 2048m -d -a 3 "$f" "$OUTPUT_FOLDER/${fname}."
              rm "$f"
            fi
          done

      - name: Get timestamp
        id: date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Push changes to repository
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || echo "Nothing to commit"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          for push_attempt in 1 2 3; do
            git pull --rebase origin "$CURRENT_BRANCH"
            if git push origin "$CURRENT_BRANCH"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Push changes to temporary branch
        if: github.event.inputs.upload_method == 'temp_branch'
        run: |
          BRANCH="${{ steps.branch.outputs.branch_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || echo "Nothing to commit"
          for push_attempt in 1 2 3; do
            if git push origin "$BRANCH"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: >-
            ${{ github.event.inputs.release_tag != '' &&
                github.event.inputs.release_tag ||
                format('spotify-{0}', github.run_number) }}
          name: "Spotify Download – ${{ github.event.inputs.spotify_url }}"
          body: |
            Spotify download completed

            URL: ${{ github.event.inputs.spotify_url }}
            Format: ${{ github.event.inputs.output_format }}
            Quality: ${{ github.event.inputs.audio_quality }} kbps
            Date: ${{ steps.date.outputs.date }}

            Powered by Meli-Action ⚡
          files: ${{ github.event.inputs.output_folder }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
