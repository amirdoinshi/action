name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      spotify_url:
        description: 'Spotify URL (track, album, or playlist)'
        required: true
        type: string
      output_format:
        description: 'Audio format'
        required: false
        type: choice
        options:
          - mp3
          - flac
          - m4a
          - ogg
          - opus
        default: 'mp3'
      audio_quality:
        description: 'Audio quality (kbps) – applies to MP3 only'
        required: false
        type: choice
        options:
          - '320'
          - '256'
          - '192'
          - '128'
        default: '320'
      max_part_mb:
        description: 'Maximum part size in MB for splitting (0 = no split)'
        required: false
        type: number
        default: 90
      output_folder:
        description: 'Folder to store downloads (relative to repo root)'
        required: false
        type: string
        default: 'downloads'
      custom_filename:
        description: 'Custom filename (only for a single track; extension added automatically)'
        required: false
        type: string
        default: ''
      upload_method:
        description: 'Upload method'
        required: false
        type: choice
        options:
          - repository
          - release
          - temp_branch
        default: 'repository'
      release_tag:
        description: 'Release tag (only used when upload_method = release)'
        required: false
        type: string
        default: ''
      branch_name:
        description: 'Temporary branch name (only used when upload_method = temp_branch)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  spotify-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🔧 Create or checkout temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          git checkout -b "${{ github.event.inputs.branch_name }}"
          git push -u origin "${{ github.event.inputs.branch_name }}"

      - name: 📁 Create output directory
        run: |
          mkdir -p "${{ github.event.inputs.output_folder }}"

      - name: 🐳 Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/downtify-img.tar
          key: ${{ runner.os }}-downtify-latest

      - name: 🐳 Load Docker image from cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load --input /tmp/downtify-img.tar

      - name: 🐳 Start downtify container
        id: start-downtify
        run: |
          # If the image wasn't cached, this will pull it first
          docker run -d \
            --name downtify \
            -p 8000:8000 \
            -v "$(pwd)/${{ github.event.inputs.output_folder }}:/downloads" \
            ghcr.io/henriquesebastiao/downtify:latest
          echo "⏳ Waiting for the web server to be ready..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ Downtify is ready"
              break
            fi
            echo "   Attempt $i/30 – still waiting..."
            sleep 2
          done

      - name: 🚀 Submit download job
        id: download
        run: |
          SPOTIFY_URL="${{ github.event.inputs.spotify_url }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.audio_quality }}"

          echo "📡 Submitting download request to downtify API..."

          curl -X POST "http://localhost:8000/api/download/url" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${SPOTIFY_URL}\"}"

          echo "✅ Download job submitted"
          echo "🕒 Waiting for the download to finish – this may take a while..."

          TIMEOUT=600
          INTERVAL=5
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            FILE_COUNT=$(find "${{ github.event.inputs.output_folder }}" -type f \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) 2>/dev/null | wc -l)
            if [ $FILE_COUNT -gt 0 ]; then
              echo "✅ Download completed – $FILE_COUNT audio file(s) found"
              break
            fi
            echo "   Still waiting... ($ELAPSED seconds elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $FILE_COUNT -eq 0 ]; then
            echo "::error::No audio files appeared after $TIMEOUT seconds – download likely failed"
            docker logs downtify
            exit 1
          fi

      - name: ✏️ Apply custom filename (single file only)
        if: github.event.inputs.custom_filename != ''
        run: |
          CUSTOM_NAME="${{ github.event.inputs.custom_filename }}"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          EXT="${{ github.event.inputs.output_format }}"

          FILE_COUNT=$(find "$OUTPUT_FOLDER" -type f \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | wc -l)

          if [ $FILE_COUNT -eq 1 ]; then
            OLD_NAME=$(find "$OUTPUT_FOLDER" -type f \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | head -1)
            NEW_NAME="$OUTPUT_FOLDER/${CUSTOM_NAME}.${EXT}"
            mv "$OLD_NAME" "$NEW_NAME"
            echo "✏️ Renamed to: ${CUSTOM_NAME}.${EXT}"
          else
            echo "⚠️ Custom filename ignored because $FILE_COUNT files were downloaded."
          fi

      - name: 🛑 Stop downtify container
        if: always()
        id: stop-downtify
        run: docker stop downtify

      - name: 🐳 Save Docker image to cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: docker save ghcr.io/henriquesebastiao/downtify:latest -o /tmp/downtify-img.tar

      - name: 🛑 Remove downtify container
        if: always()
        run: docker rm downtify

      - name: ✂️ Split large files (repository / temp_branch)
        if: github.event.inputs.upload_method == 'repository' || github.event.inputs.upload_method == 'temp_branch'
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$THRESH_MB" -gt 0 ] && [ "$fs" -gt "$THRESH_BYTES" ]; then
              echo "🔪 Splitting $fname ($(( fs / 1024 / 1024 )) MB) into ${THRESH_MB} MB parts..."
              split -b "${THRESH_MB}m" -d -a 3 "$f" "$OUTPUT_FOLDER/${fname}."
              rm "$f"
              echo "✅ Split completed"
            fi
          done

      - name: ✂️ Split large files (release – max 2 GB)
        if: github.event.inputs.upload_method == 'release'
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          LIMIT_BYTES=$((2 * 1024 * 1024 * 1024))

          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$fs" -gt "$LIMIT_BYTES" ]; then
              echo "🔪 Splitting $fname ($(( fs / 1024 / 1024 )) MB) into 2 GB parts..."
              split -b 2048m -d -a 3 "$f" "$OUTPUT_FOLDER/${fname}."
              rm "$f"
              echo "✅ Split completed"
            fi
          done

      - name: 📅 Get current date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to repository
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || echo "Nothing to commit"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          for push_attempt in 1 2 3; do
            git pull --rebase origin "$CURRENT_BRANCH"
            if git push origin "$CURRENT_BRANCH"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: 📤 Push to temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || echo "Nothing to commit"
          for push_attempt in 1 2 3; do
            if git push origin "${{ github.event.inputs.branch_name }}"; then
              break
            fi
            echo "⚠️ Push attempt $push_attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('spotify-{0}', github.run_number) }}
          name: "Spotify Download – ${{ github.event.inputs.spotify_url }}"
          body: |
            Spotify download completed

            URL: ${{ github.event.inputs.spotify_url }}
            Format: ${{ github.event.inputs.output_format }}
            Quality: ${{ github.event.inputs.audio_quality }} kbps
            Downloaded on: ${{ steps.get_date.outputs.date }}

            Powered by Meli-Action ⚡
          files: ${{ github.event.inputs.output_folder }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
