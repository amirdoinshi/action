name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      spotify_url:
        description: 'Spotify URL (track, album, playlist)'
        required: true
        type: string
      output_format:
        description: 'Audio format'
        required: false
        type: choice
        options: ['mp3', 'flac', 'm4a', 'ogg', 'opus']
        default: 'mp3'
      audio_quality:
        description: 'Bitrate (kbps) – MP3 only'
        required: false
        type: choice
        options: ['320', '256', '192', '128']
        default: '320'
      max_part_mb:
        description: 'Split files larger than (MB, 0 = no split)'
        required: false
        type: number
        default: 90
      output_folder:
        description: 'Output folder (relative to repo root)'
        required: false
        type: string
        default: 'downloads'
      custom_filename:
        description: 'Custom filename (only for a single track)'
        required: false
        type: string
        default: ''
      upload_method:
        description: 'Upload method'
        required: false
        type: choice
        options: ['repository', 'release', 'temp_branch']
        default: 'repository'
      release_tag:
        description: 'Release tag (for release method)'
        required: false
        type: string
        default: ''
      branch_name:
        description: 'Temp branch name (for temp_branch)'
        required: false
        type: string
        default: ''
      cookies:
        description: |
          YouTube cookies (Netscape format) to bypass bot-detection.
          Safer alternative: store as a repo secret named YT_COOKIES — used automatically.
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  spotify-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Create or checkout temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          git checkout -b "${{ github.event.inputs.branch_name }}"
          git push -u origin "${{ github.event.inputs.branch_name }}"

      - name: Create output directory
        run: mkdir -p "${{ github.event.inputs.output_folder }}"

      - name: Cache npm (bgutil PO Token server)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-bgutil-v1.3.1

      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/downtify-img.tar
          key: ${{ runner.os }}-downtify-latest

      - name: Load Docker image from cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load --input /tmp/downtify-img.tar

      # ── Run bgutil PO Token server on the runner host ──
      # The pip plugin (installed inside the container) talks to this server via
      # the Docker bridge IP (172.17.0.1). This is exactly how the working
      # youtube_adv_download workflow generates real PO Tokens.
      - name: Build & start bgutil PO Token server
        run: |
          rm -rf /tmp/bgutil
          git clone --depth 1 --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git \
            /tmp/bgutil
          cd /tmp/bgutil/server && npm ci --prefer-offline && npx tsc
          node /tmp/bgutil/server/build/main.js &
          sleep 5
          curl -s http://localhost:4416/ping \
            && echo "✅ PO Token server ready" \
            || echo "::warning::PO Token server not responding on :4416"

      # ── KEY FIX: volume-mount cookies (writable) + restart after pip so plugins load ──
      - name: Start downtify container
        id: start-downtify
        run: |
          # ── Resolve cookies: inline input takes priority, then YT_COOKIES secret ──
          if [ -n "$INPUT_COOKIES" ]; then
            printf '%s' "$INPUT_COOKIES" > /tmp/cookies.txt
            echo "Using inline cookies ($(wc -l < /tmp/cookies.txt) lines)"
          elif [ -n "$SECRET_YT_COOKIES" ]; then
            printf '%s' "$SECRET_YT_COOKIES" > /tmp/cookies.txt
            echo "Using YT_COOKIES secret ($(wc -l < /tmp/cookies.txt) lines)"
          else
            echo "::warning::No cookies provided — downloads will likely fail on YouTube"
          fi

          # ── Build YTDL_OPTIONS ──
          # - cookiefile: volume-mounted path (writable so yt-dlp can save cookie updates)
          # - extractor_args: matches the working youtube_adv_download workflow exactly:
          #     player_client — tries web_music first, falls back through web/tv/android/ios
          #     po_token=web+tv — tells yt-dlp to request PO tokens for these clients;
          #                       the bgutil pip plugin fetches them from the host server
          #                       via YTDLP_PO_TOKEN_URL (set in docker run -e below)
          if [ -f /tmp/cookies.txt ]; then
            YTDL_OPTS='{"concurrent_fragments":16,"cookiefile":"/cookies/cookies.txt","extractor_args":{"youtube":{"player_client":["web_music","web","tv","android","ios"],"po_token":["web+tv"]}}}'
            COOKIE_MOUNT="-v /tmp/cookies.txt:/cookies/cookies.txt"
            echo "✅ Cookies mount enabled (writable)"
          else
            YTDL_OPTS='{"concurrent_fragments":16,"extractor_args":{"youtube":{"player_client":["web_music","web","tv","android","ios"],"po_token":["web+tv"]}}}'
            COOKIE_MOUNT=""
          fi

          # --network host: container shares the host's network stack, so
          # localhost:4416 inside the container IS the bgutil server on the host.
          # 172.17.0.1 (bridge IP) does NOT work because bgutil binds to 127.0.0.1
          # only. With host networking there is no bridge — loopback is shared.
          # Note: -p is not needed with host networking (port 8000 is already on host).
          docker run -d \
            --name downtify \
            --network host \
            -v "$(pwd)/${{ github.event.inputs.output_folder }}:/downloads" \
            $COOKIE_MOUNT \
            -e "YTDL_OPTIONS=$YTDL_OPTS" \
            -e "YTDLP_PO_TOKEN_URL=http://localhost:4416" \
            ghcr.io/henriquesebastiao/downtify:latest

          # ── Wait for the web server to become ready ──
          echo "Waiting for web server..."
          READY=0
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 3 --max-time 5 http://localhost:8000 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" =~ ^[23] ]]; then
              echo "✅ Server ready (HTTP $HTTP_CODE)"
              READY=1
              break
            fi
            echo "  attempt $i/30 – HTTP $HTTP_CODE – retrying..."
            sleep 2
          done
          if [ $READY -eq 0 ]; then
            echo "::error::Downtify never became ready after 60s"
            docker logs downtify --tail 50
            exit 1
          fi

          # ── Install Node.js for yt-dlp JS challenge solving ──
          # yt-dlp needs a JS runtime to solve YouTube's n-challenge and signature
          # decryption. Without it you get "Signature solving failed" warnings and
          # some formats become unavailable.
          echo "Installing Node.js..."
          docker exec downtify sh -c '
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache nodejs 2>/dev/null
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends nodejs 2>/dev/null
            fi
          ' || echo "::warning::Could not install Node.js — some formats may be missing"

          # ── Install bgutil PO Token provider ──
          echo "Installing bgutil PO Token provider..."
          docker exec downtify pip install bgutil-yt-dlp-pot-provider --quiet \
            || echo "::warning::Could not install bgutil — GVS PO Token will be missing"

          # ── Upgrade yt-dlp ──
          echo "Upgrading yt-dlp..."
          docker exec downtify pip install --upgrade yt-dlp --quiet

          # ── CRITICAL: restart so downtify re-imports yt-dlp with bgutil loaded ──
          # bgutil is a yt-dlp plugin discovered at import time. The downtify process
          # already imported yt-dlp before pip install, so bgutil has zero effect on
          # the running process. A restart forces a fresh import with the plugin present.
          echo "Restarting container so yt-dlp reloads plugins..."
          docker restart downtify

          echo "Waiting for server after restart..."
          READY=0
          for i in {1..20}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 3 --max-time 5 http://localhost:8000 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" =~ ^[23] ]]; then
              echo "✅ Server ready after restart (HTTP $HTTP_CODE)"
              READY=1
              break
            fi
            echo "  attempt $i/20 – HTTP $HTTP_CODE – retrying..."
            sleep 2
          done
          if [ $READY -eq 0 ]; then
            echo "::error::Downtify did not recover after restart"
            docker logs downtify --tail 50
            exit 1
          fi

          # ── Apply format and bitrate settings ──
          echo "Applying format and bitrate settings..."
          curl -s -o /dev/null --connect-timeout 10 --max-time 15 \
            -X POST http://localhost:8000/api/settings/update \
            -H "Content-Type: application/json" \
            -d "{\"format\":\"${{ github.event.inputs.output_format }}\",\"bitrate\":\"${{ github.event.inputs.audio_quality }}\"}"

        env:
          INPUT_COOKIES: ${{ github.event.inputs.cookies }}
          SECRET_YT_COOKIES: ${{ secrets.YT_COOKIES }}

      - name: Detect if playlist/album
        id: detect
        run: |
          URL="${{ github.event.inputs.spotify_url }}"
          if [[ "$URL" =~ /playlist/|/album/ ]]; then
            echo "is_playlist=true" >> $GITHUB_OUTPUT
          else
            echo "is_playlist=false" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------
      # SINGLE TRACK – using query parameter
      # ----------------------------------------------
      - name: Single track (POST /api/download/url)
        if: steps.detect.outputs.is_playlist == 'false'
        run: |
          ENCODED_URL=$(printf '%s' "${{ github.event.inputs.spotify_url }}" | jq -sRr @uri)
          echo "Downloading single track..."
          HTTP_CODE=$(curl -s -o /tmp/dl_response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 600 \
            -X POST "http://localhost:8000/api/download/url?url=${ENCODED_URL}")
          echo "  API response: $HTTP_CODE - $(cat /tmp/dl_response.json)"
          if [[ ! "$HTTP_CODE" =~ ^[23] ]]; then
            echo "::error::Download API returned HTTP $HTTP_CODE"
            docker logs downtify --tail 50
            exit 1
          fi
          COUNT=$(find "${{ github.event.inputs.output_folder }}" -type f \
            \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | wc -l)
          echo "Download complete – $COUNT file(s)"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::API succeeded but no audio file found in output folder"
            docker logs downtify --tail 50
            exit 1
          fi

      # ----------------------------------------------
      # PLAYLIST / ALBUM – resolve metadata
      # ----------------------------------------------
      - name: Playlist/album – resolve metadata
        if: steps.detect.outputs.is_playlist == 'true'
        id: resolve
        run: |
          ENCODED_URL=$(printf '%s' "${{ github.event.inputs.spotify_url }}" | jq -sRr @uri)
          echo "Resolving playlist/album metadata from Spotify embed..."
          curl -s "http://localhost:8000/api/song/url?url=${ENCODED_URL}" > /tmp/tracks.json
          cat /tmp/tracks.json
          TRACK_COUNT=$(jq 'if type=="array" then length else 1 end' /tmp/tracks.json)
          echo "track_count=$TRACK_COUNT" >> $GITHUB_OUTPUT

      # ----------------------------------------------
      # PLAYLIST / ALBUM – batch download (parallel)
      # ----------------------------------------------
      - name: Playlist/album – batch download (parallel, up to 4 concurrent)
        if: steps.detect.outputs.is_playlist == 'true'
        run: |
          echo "Submitting batch download..."
          BATCH_BODY=$(jq -n \
            --argjson songs "$(jq 'if type=="array" then . else [.] end' /tmp/tracks.json)" \
            --arg playlist_url "${{ github.event.inputs.spotify_url }}" \
            '{songs: $songs, playlist_url: $playlist_url, generate_m3u: true}')
          HTTP_CODE=$(curl -s -o /tmp/batch_response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 60 \
            -X POST http://localhost:8000/api/download/batch \
            -H "Content-Type: application/json" \
            -d "$BATCH_BODY")
          echo "  Batch API response: $HTTP_CODE - $(cat /tmp/batch_response.json)"
          if [[ ! "$HTTP_CODE" =~ ^[23] ]]; then
            echo "::error::Batch API returned HTTP $HTTP_CODE"
            docker logs downtify --tail 50
            exit 1
          fi

          EXPECTED=${{ steps.resolve.outputs.track_count }}
          TIMEOUT=1200
          ELAPSED=0
          PREV_COUNT=0
          STABLE=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            COUNT=$(find "${{ github.event.inputs.output_folder }}" -type f \
              \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | wc -l)
            if [ $COUNT -eq $EXPECTED ]; then
              echo "✅ All $EXPECTED tracks downloaded"
              break
            fi
            if [ $COUNT -gt 0 ] && [ $COUNT -eq $PREV_COUNT ]; then
              STABLE=$((STABLE + 1))
              if [ $STABLE -ge 5 ]; then
                echo "⚠️ No new files for 50s – assuming finished with $COUNT/$EXPECTED tracks"
                break
              fi
            else
              STABLE=0
            fi
            PREV_COUNT=$COUNT
            echo "  Downloaded $COUNT / $EXPECTED – waiting..."
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          if [ $COUNT -eq 0 ]; then
            echo "::error::No files downloaded after $TIMEOUT seconds"
            docker logs downtify --tail 100
            exit 1
          fi

      # ----------------------------------------------
      # DEBUG – runs always, invaluable when things fail
      # ----------------------------------------------
      - name: Debug cookies & yt-dlp
        if: always()
        run: |
          echo "=== bgutil reachable from HOST ==="
          curl -s --max-time 3 http://localhost:4416/ping && echo "bgutil up on host" || echo "bgutil not responding on host"
          echo "=== bgutil reachable from INSIDE container ==="
          docker exec downtify sh -c 'curl -s --max-time 3 http://localhost:4416/ping' \
            && echo "bgutil reachable from container" \
            || echo "bgutil NOT reachable from container"
          echo "=== YTDLP_PO_TOKEN_URL inside container ==="
          docker exec downtify sh -c 'echo $YTDLP_PO_TOKEN_URL'
          echo "=== Cookie mount check ==="
          docker exec downtify ls -la /cookies/ 2>/dev/null || echo "No /cookies mount"
          echo "=== YTDL_OPTIONS inside container ==="
          docker exec downtify sh -c 'echo $YTDL_OPTIONS'
          echo "=== yt-dlp version ==="
          docker exec downtify yt-dlp --version 2>/dev/null || echo "Container already stopped"
          echo "=== Quick title probe (no download) ==="
          docker exec downtify yt-dlp \
            --cookies /cookies/cookies.txt \
            --print title \
            "https://music.youtube.com/watch?v=UooqxWn0GBY" 2>&1 || true
          echo "=== Last 80 container log lines ==="
          docker logs downtify --tail 80 2>/dev/null || true

      # ----------------------------------------------
      # POST-PROCESSING
      # ----------------------------------------------
      - name: Apply custom filename (single file only)
        if: github.event.inputs.custom_filename != '' && steps.detect.outputs.is_playlist == 'false'
        run: |
          CUSTOM="${{ github.event.inputs.custom_filename }}"
          EXT="${{ github.event.inputs.output_format }}"
          OUTPUT="${{ github.event.inputs.output_folder }}"
          OLD=$(find "$OUTPUT" -type f \
            \( -name "*.mp3" -o -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | head -1)
          if [ -f "$OLD" ]; then
            mv "$OLD" "$OUTPUT/${CUSTOM}.${EXT}"
            echo "✅ Renamed to ${CUSTOM}.${EXT}"
          fi

      - name: Stop container
        if: always()
        run: docker stop downtify

      - name: Save Docker image to cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: docker save ghcr.io/henriquesebastiao/downtify:latest -o /tmp/downtify-img.tar

      - name: Remove container
        if: always()
        run: docker rm downtify

      - name: Split large files (repository / temp_branch)
        if: github.event.inputs.upload_method == 'repository' || github.event.inputs.upload_method == 'temp_branch'
        run: |
          OUTPUT="${{ github.event.inputs.output_folder }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [ "$THRESH_MB" -le 0 ]; then exit 0; fi
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          for f in "$OUTPUT"/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $THRESH_BYTES ]; then
              echo "Splitting $(basename "$f") into ${THRESH_MB}MB parts"
              split -b "${THRESH_MB}m" -d -a 3 "$f" "$OUTPUT/$(basename "$f")."
              rm "$f"
            fi
          done

      - name: Split large files (release – 2GB limit)
        if: github.event.inputs.upload_method == 'release'
        run: |
          OUTPUT="${{ github.event.inputs.output_folder }}"
          LIMIT=$((2*1024*1024*1024))
          for f in "$OUTPUT"/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $LIMIT ]; then
              echo "Splitting $(basename "$f") into 2GB parts"
              split -b 2048m -d -a 3 "$f" "$OUTPUT/$(basename "$f")."
              rm "$f"
            fi
          done

      - name: Get date
        id: date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Push to repository
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || exit 0
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then break; fi
            sleep 5
          done

      - name: Push to temporary branch
        if: github.event.inputs.upload_method == 'temp_branch' && github.event.inputs.branch_name != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "🎵 Spotify download: ${{ github.event.inputs.spotify_url }} [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git push origin "${{ github.event.inputs.branch_name }}"; then break; fi
            sleep 5
          done

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('spotify-{0}', github.run_number) }}
          name: "Spotify Download – ${{ github.event.inputs.spotify_url }}"
          body: |
            Spotify download completed

            URL: ${{ github.event.inputs.spotify_url }}
            Format: ${{ github.event.inputs.output_format }}
            Quality: ${{ github.event.inputs.audio_quality }} kbps
            Date: ${{ steps.date.outputs.date }}

            Powered by Meli-Action ⚡
          files: ${{ github.event.inputs.output_folder }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
