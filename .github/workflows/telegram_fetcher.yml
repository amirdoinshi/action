name: TG Fetcher

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Comma-separated Telegram channel URLs'
        required: true
        type: string
      run_id:
        description: 'Unique run ID for this fetch'
        required: true
        type: string
      history:
        description: 'JSON of already-sent message IDs per channel'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  fetch-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bs4-lxml

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch Telegram messages
        run: python3 scripts/fetch_telegram.py
        env:
          INPUT_CHANNELS: ${{ github.event.inputs.channels }}
          INPUT_RUN_ID:   ${{ github.event.inputs.run_id }}
          INPUT_HISTORY:  ${{ github.event.inputs.history }}

      - name: Create temporary results branch
        run: |
          BRANCH="temp-run-${{ github.event.inputs.run_id }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local http.postBuffer 524288000
          git config --local pack.window 1
          git config --local pack.depth 0
          git config --local core.compression 0
          git config --local pack.compression 0

          git checkout --orphan "$BRANCH"
          git rm -rf . 2>/dev/null || true

          if [ -d "downloads" ]; then
            git add downloads/
            git commit -m "fetch ${{ github.event.inputs.run_id }}"
          else
            git commit --allow-empty -m "no-messages ${{ github.event.inputs.run_id }}"
          fi

          git push origin "$BRANCH"
          echo "Pushed branch: $BRANCH"
