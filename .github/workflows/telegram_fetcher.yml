name: Telegram Channel Fetcher

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Comma-separated Telegram channel URLs'
        required: true
        type: string
      run_id:
        description: 'Unique run ID for this fetch'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Fetch Telegram messages and media
        run: |
          python3 << 'EOF'
          import os
          import json
          import re
          import time
          import requests
          from bs4 import BeautifulSoup
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import urlparse
          
          CHANNELS = os.environ.get("INPUT_CHANNELS", "").split(",")
          RUN_ID = os.environ.get("INPUT_RUN_ID", "")
          OUTPUT_DIR = f"downloads/run_{RUN_ID}"
          
          Path(OUTPUT_DIR).mkdir(parents=True, exist_ok=True)
          media_dir = Path(f"{OUTPUT_DIR}/media")
          media_dir.mkdir(exist_ok=True)
          
          MAX_FILE_SIZE_MB = 50
          MAX_FILE_SIZE_BYTES = MAX_FILE_SIZE_MB * 1024 * 1024
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
          
          all_messages = []
          
          for channel_url in CHANNELS:
              channel_url = channel_url.strip()
              if not channel_url:
                  continue
              
              channel_name = channel_url.rstrip('/').split('/')[-1]
              print(f"\n📡 Fetching: {channel_name}")
              
              try:
                  resp = requests.get(channel_url, headers=headers, timeout=30)
                  resp.raise_for_status()
              except Exception as e:
                  print(f"  ❌ Failed: {e}")
                  continue
              
              soup = BeautifulSoup(resp.text, 'html.parser')
              messages = soup.find_all('div', class_='tgme_widget_message')
              
              print(f"  Found {len(messages)} messages")
              
              for msg in messages:
                  # Extract message ID
                  msg_link = msg.find('a', class_='tgme_widget_message_date')
                  if not msg_link or not msg_link.get('href'):
                      continue
                  
                  msg_id = msg_link['href'].split('/')[-1]
                  
                  # Extract timestamp
                  time_elem = msg.find('time')
                  timestamp = time_elem.get('datetime') if time_elem else None
                  
                  # Extract text content
                  text_elem = msg.find('div', class_='tgme_widget_message_text')
                  text = text_elem.get_text() if text_elem else ""
                  
                  # Extract media (photos)
                  photo_urls = []
                  photo_wraps = msg.find_all('a', class_='tgme_widget_message_photo_wrap')
                  
                  for pw in photo_wraps:
                      style = pw.get('style', '')
                      match = re.search(r"url\('([^']+)'\)", style)
                      if match:
                          photo_urls.append(match.group(1))
                  
                  # Extract video
                  video_url = None
                  video_elem = msg.find('video')
                  if video_elem and video_elem.get('src'):
                      video_url = video_elem['src']
                  
                  # Extract document
                  doc_url = None
                  doc_elem = msg.find('a', class_='tgme_widget_message_document')
                  if doc_elem and doc_elem.get('href'):
                      doc_url = doc_elem['href']
                  
                  # Download media files
                  downloaded_media = []
                  
                  # Download photos
                  for i, url in enumerate(photo_urls[:5]):  # Max 5 photos per message
                      try:
                          resp = requests.get(url, timeout=60, stream=True)
                          if resp.status_code == 200:
                              # Check content length
                              content_length = int(resp.headers.get('content-length', 0))
                              if content_length > MAX_FILE_SIZE_BYTES:
                                  print(f"    ⚠️ Photo too large ({content_length/1024/1024:.1f}MB > {MAX_FILE_SIZE_MB}MB), skipping")
                                  continue
                              
                              ext = url.split('.')[-1].split('?')[0]
                              if ext not in ['jpg', 'jpeg', 'png', 'gif', 'webp']:
                                  ext = 'jpg'
                              
                              filename = f"{msg_id}_photo_{i}.{ext}"
                              filepath = media_dir / filename
                              
                              with open(filepath, 'wb') as f:
                                  for chunk in resp.iter_content(chunk_size=8192):
                                      f.write(chunk)
                              
                              downloaded_media.append({
                                  'type': 'photo',
                                  'filename': filename,
                                  'size': content_length
                              })
                              print(f"    📸 Downloaded photo {i+1}: {filename} ({content_length/1024:.0f}KB)")
                      except Exception as e:
                          print(f"    ❌ Failed to download photo: {e}")
                  
                  # Download video
                  if video_url:
                      try:
                          # First check size with HEAD
                          head_resp = requests.head(video_url, timeout=30)
                          content_length = int(head_resp.headers.get('content-length', 0))
                          
                          if content_length > MAX_FILE_SIZE_BYTES:
                              print(f"    ⚠️ Video too large ({content_length/1024/1024:.1f}MB > {MAX_FILE_SIZE_MB}MB), skipping")
                          else:
                              resp = requests.get(video_url, timeout=120, stream=True)
                              if resp.status_code == 200:
                                  filename = f"{msg_id}_video.mp4"
                                  filepath = media_dir / filename
                                  
                                  with open(filepath, 'wb') as f:
                                      for chunk in resp.iter_content(chunk_size=8192):
                                          f.write(chunk)
                                  
                                  downloaded_media.append({
                                      'type': 'video',
                                      'filename': filename,
                                      'size': content_length
                                  })
                                  print(f"    🎥 Downloaded video: {filename} ({content_length/1024/1024:.1f}MB)")
                      except Exception as e:
                          print(f"    ❌ Failed to download video: {e}")
                  
                  # Download document
                  if doc_url:
                      try:
                          resp = requests.get(doc_url, timeout=60, stream=True)
                          if resp.status_code == 200:
                              content_length = int(resp.headers.get('content-length', 0))
                              if content_length > MAX_FILE_SIZE_BYTES:
                                  print(f"    ⚠️ Document too large ({content_length/1024/1024:.1f}MB > {MAX_FILE_SIZE_MB}MB), skipping")
                              else:
                                  # Extract filename from Content-Disposition or URL
                                  filename = f"{msg_id}_document"
                                  if 'content-disposition' in resp.headers:
                                      cd = resp.headers['content-disposition']
                                      match = re.search(r'filename="?([^"]+)"?', cd)
                                      if match:
                                          filename = match.group(1)
                                  else:
                                      ext = doc_url.split('.')[-1].split('?')[0]
                                      filename = f"{msg_id}_document.{ext}"
                                  
                                  filepath = media_dir / filename
                                  
                                  with open(filepath, 'wb') as f:
                                      for chunk in resp.iter_content(chunk_size=8192):
                                          f.write(chunk)
                                  
                                  downloaded_media.append({
                                      'type': 'document',
                                      'filename': filename,
                                      'size': content_length
                                  })
                                  print(f"    📎 Downloaded document: {filename} ({content_length/1024:.0f}KB)")
                      except Exception as e:
                          print(f"    ❌ Failed to download document: {e}")
                  
                  # Create message JSON
                  message_data = {
                      'id': msg_id,
                      'channel': channel_name,
                      'channel_url': channel_url,
                      'text': text,
                      'timestamp': timestamp,
                      'media': downloaded_media,
                      'fetched_at': datetime.now().isoformat()
                  }
                  
                  # Save individual message file
                  msg_file = Path(OUTPUT_DIR) / f"{channel_name}_{msg_id}.json"
                  with open(msg_file, 'w', encoding='utf-8') as f:
                      json.dump(message_data, f, indent=2, ensure_ascii=False)
                  
                  all_messages.append(message_data)
                  print(f"  ✅ Message {msg_id}: {len(text)} chars, {len(downloaded_media)} media")
                  
                  # Small delay to be respectful
                  time.sleep(0.5)
              
              print(f"  Total: {len([m for m in all_messages if m['channel'] == channel_name])} messages")
          
          # Save summary file
          summary = {
              'run_id': RUN_ID,
              'fetched_at': datetime.now().isoformat(),
              'total_messages': len(all_messages),
              'channels': list(set(m['channel'] for m in all_messages))
          }
          
          with open(Path(OUTPUT_DIR) / 'summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          
          print(f"\n📊 Summary: {len(all_messages)} messages from {len(summary['channels'])} channels")
          
          # Set output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"message_count={len(all_messages)}\n")
          EOF
        env:
          INPUT_CHANNELS: ${{ github.event.inputs.channels }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          
      - name: Create temporary branch
        run: |
          BRANCH_NAME="temp-run-${{ github.event.inputs.run_id }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create orphan branch (no history)
          git checkout --orphan "${BRANCH_NAME}"
          git rm -rf . 2>/dev/null || true
          
          # Add only the download folder
          git add downloads/
          git commit -m "Telegram fetch ${{ github.event.inputs.run_id }}"
          git push origin "${BRANCH_NAME}"
          
          echo "✅ Created branch: ${BRANCH_NAME}"