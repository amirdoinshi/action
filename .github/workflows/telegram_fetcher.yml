name: Telegram Channel Fetcher

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Comma-separated Telegram channel URLs'
        required: true
        type: string
      run_id:
        description: 'Unique run ID for this fetch'
        required: true
        type: string
      history:
        description: 'JSON string of already sent message IDs per channel'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  fetch-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-telegram-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-telegram-
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
          
      - name: Fetch Telegram RAW data (no formatting)
        run: |
          python3 << 'EOF'
          import os
          import json
          import re
          import time
          import requests
          from bs4 import BeautifulSoup
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          from concurrent.futures import ThreadPoolExecutor, as_completed
          
          # ============================================================================
          # Configuration
          # ============================================================================
          
          CHANNELS = os.environ.get("INPUT_CHANNELS", "").split(",")
          RUN_ID = os.environ.get("INPUT_RUN_ID", "")
          HISTORY_JSON = os.environ.get("INPUT_HISTORY", "{}")
          OUTPUT_DIR = f"downloads/run_{RUN_ID}"
          
          # Tehran timezone (UTC+3:30)
          TEHRAN_TZ = timezone(timedelta(hours=3, minutes=30))
          
          # Rate limiting
          MAX_WORKERS = 2
          REQUEST_DELAY = 1.0
          
          # Media settings
          MAX_FILE_SIZE_MB = 50
          MAX_FILE_SIZE_BYTES = MAX_FILE_SIZE_MB * 1024 * 1024
          MAX_PHOTOS_PER_MESSAGE = 5
          
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
          
          Path(OUTPUT_DIR).mkdir(parents=True, exist_ok=True)
          media_dir = Path(f"{OUTPUT_DIR}/media")
          media_dir.mkdir(exist_ok=True)
          
          sent_history = json.loads(HISTORY_JSON) if HISTORY_JSON else {}
          
          # Regex patterns
          RE_MSG_ID = re.compile(r'/(\d+)$')
          RE_BG_IMAGE_URL = re.compile(r"background-image:url\('([^']+)'\)")
          RE_TIME = re.compile(r'(\d{1,2}:\d{2})')
          
          # ============================================================================
          # Extraction functions - NO formatting, just raw data
          # ============================================================================
          
          def extract_message_id(wrap) -> str | None:
              try:
                  link = wrap.find('a', class_='tgme_widget_message_date')
                  if link and link.get('href'):
                      m = RE_MSG_ID.search(link['href'])
                      if m:
                          return m.group(1)
              except Exception:
                  pass
              return None
          
          def extract_timestamp(bubble) -> str | None:
              try:
                  time_el = bubble.find('time', class_='time')
                  if time_el and time_el.get('datetime'):
                      dt = datetime.fromisoformat(time_el['datetime'].replace('Z', '+00:00'))
                      tehran_dt = dt.astimezone(timezone.utc) + TEHRAN_TZ
                      return tehran_dt.strftime('%H:%M')
                  footer = bubble.find('div', class_='tgme_widget_message_footer')
                  if footer:
                      m = RE_TIME.search(footer.get_text())
                      if m:
                          return m.group(1)
              except Exception:
                  pass
              return None
          
          def extract_raw_html(bubble) -> str:
              """Extract RAW HTML content - NO conversion, just the HTML string"""
              # Strip reactions and footer
              for cls in ('tgme_widget_message_reactions', 'tgme_widget_message_footer'):
                  el = bubble.find('div', class_=cls)
                  if el:
                      el.decompose()
              
              # Handle reply quotes
              reply_html = ''
              reply_el = bubble.find('a', class_='tgme_widget_message_reply')
              if reply_el:
                  reply_html = str(reply_el)
                  reply_el.decompose()
              
              # Get main content
              grouped = bubble.find('div', class_='tgme_widget_message_grouped_wrap')
              if grouped:
                  text_el = None
                  for sibling in grouped.find_next_siblings('div'):
                      if 'tgme_widget_message_text' in sibling.get('class', []):
                          text_el = sibling
                          break
              else:
                  text_el = bubble.find('div', class_='tgme_widget_message_text')
              
              if text_el:
                  inner = text_el.find('div', class_='tgme_widget_message_text')
                  if inner:
                      text_el = inner
                  html_content = str(text_el) if text_el else ''
              else:
                  html_content = ''
              
              return (reply_html + html_content) if reply_html else html_content
          
          def download_media(url: str, filepath: Path, media_type: str) -> tuple[bool, int]:
              try:
                  head_resp = requests.head(url, timeout=30, headers=HEADERS)
                  content_length = int(head_resp.headers.get('content-length', 0))
                  if content_length > MAX_FILE_SIZE_BYTES:
                      print(f"      ⚠️ {media_type} too large ({content_length/1024/1024:.1f}MB)")
                      return False, 0
                  resp = requests.get(url, timeout=120, stream=True, headers=HEADERS)
                  if resp.status_code == 200:
                      with open(filepath, 'wb') as f:
                          for chunk in resp.iter_content(chunk_size=8192):
                              f.write(chunk)
                      return True, content_length
              except Exception as e:
                  print(f"      ❌ Failed: {e}")
              return False, 0
          
          # ============================================================================
          # Fetch channel - NO formatting, just raw data
          # ============================================================================
          
          def fetch_channel(channel_url: str) -> list[dict]:
              channel_url = channel_url.strip()
              if not channel_url:
                  return []
              
              channel_name = channel_url.rstrip('/').split('/')[-1]
              print(f"\n📡 Fetching: {channel_name}")
              
              sent_ids = sent_history.get(channel_url, [])
              
              try:
                  resp = requests.get(channel_url, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
              except Exception as e:
                  print(f"  ❌ Failed: {e}")
                  return []
              
              soup = BeautifulSoup(resp.text, 'lxml')
              channel_history = soup.find('section', class_='tgme_channel_history')
              if not channel_history:
                  print(f"  ⚠️ No history section")
                  return []
              
              messages = channel_history.find_all('div', class_='tgme_widget_message_wrap')
              print(f"  Found {len(messages)} messages")
              
              channel_messages = []
              new_count = 0
              
              for wrap in reversed(messages):
                  bubble = wrap.find('div', class_='tgme_widget_message_bubble')
                  if not bubble:
                      continue
                  
                  msg_id = extract_message_id(wrap)
                  if not msg_id:
                      continue
                  
                  if msg_id in sent_ids:
                      print(f"  Hit known {msg_id}, stopping (found {new_count} new)")
                      break
                  
                  timestamp = extract_timestamp(bubble)
                  raw_html = extract_raw_html(bubble)  # RAW HTML, no conversion
                  
                  # Extract media
                  photo_urls = []
                  for pw in bubble.find_all('a', class_='tgme_widget_message_photo_wrap'):
                      style = pw.get('style', '')
                      match = RE_BG_IMAGE_URL.search(style)
                      if match:
                          photo_urls.append(match.group(1))
                  
                  video_url = None
                  video_el = bubble.find('video')
                  if video_el and video_el.get('src'):
                      video_url = video_el['src']
                  
                  telegram_post_link = None
                  video_player = bubble.find('a', class_='tgme_widget_message_video_player')
                  if video_player:
                      telegram_post_link = video_player.get('href')
                  elif photo_urls:
                      first_photo = bubble.find('a', class_='tgme_widget_message_photo_wrap')
                      if first_photo:
                          telegram_post_link = first_photo.get('href')
                  
                  # Download media
                  downloaded_media = []
                  
                  for i, url in enumerate(photo_urls[:MAX_PHOTOS_PER_MESSAGE]):
                      filename = f"{msg_id}_photo_{i}.jpg"
                      filepath = media_dir / filename
                      success, size = download_media(url, filepath, "photo")
                      if success:
                          downloaded_media.append({'type': 'photo', 'filename': filename, 'size': size})
                          print(f"    📸 Downloaded photo {i+1}")
                  
                  if video_url:
                      filename = f"{msg_id}_video.mp4"
                      filepath = media_dir / filename
                      success, size = download_media(video_url, filepath, "video")
                      if success:
                          downloaded_media.append({'type': 'video', 'filename': filename, 'size': size})
                          print(f"    🎥 Downloaded video")
                  
                  # Store RAW data (bot will do formatting)
                  message_data = {
                      'message_id': msg_id,
                      'channel': channel_name,
                      'channel_url': channel_url,
                      'raw_html': raw_html,  # RAW HTML - bot will convert to markdown
                      'timestamp': timestamp,
                      'photo_url': photo_urls[0] if photo_urls else None,
                      'photo_count': len(photo_urls),
                      'video_url': video_url,
                      'telegram_post_link': telegram_post_link,
                      'downloaded_media': downloaded_media,
                      'fetched_at': datetime.now(timezone.utc).astimezone(TEHRAN_TZ).isoformat()
                  }
                  
                  msg_file = Path(OUTPUT_DIR) / f"{channel_name}_{msg_id}.json"
                  with open(msg_file, 'w', encoding='utf-8') as f:
                      json.dump(message_data, f, indent=2, ensure_ascii=False)
                  
                  channel_messages.append(message_data)
                  new_count += 1
                  print(f"  ✅ Message {msg_id}")
                  
                  time.sleep(REQUEST_DELAY)
              
              print(f"  Total new: {new_count}")
              return channel_messages
          
          # ============================================================================
          # Parallel fetch
          # ============================================================================
          
          all_messages = []
          
          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
              future_to_channel = {executor.submit(fetch_channel, url): url for url in CHANNELS if url}
              for future in as_completed(future_to_channel):
                  try:
                      all_messages.extend(future.result())
                  except Exception as e:
                      print(f"❌ Failed: {e}")
          
          summary = {
              'run_id': RUN_ID,
              'fetched_at': datetime.now(timezone.utc).astimezone(TEHRAN_TZ).isoformat(),
              'total_messages': len(all_messages),
              'channels': list(set(m['channel'] for m in all_messages))
          }
          
          with open(Path(OUTPUT_DIR) / 'summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          
          print(f"\n📊 Summary: {len(all_messages)} new messages")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"message_count={len(all_messages)}\n")
          EOF
        env:
          INPUT_CHANNELS: ${{ github.event.inputs.channels }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          INPUT_HISTORY: ${{ github.event.inputs.history }}
          
      - name: Create temporary branch
        run: |
          BRANCH_NAME="temp-run-${{ github.event.inputs.run_id }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan "${BRANCH_NAME}"
          git rm -rf . 2>/dev/null || true
          
          git add downloads/
          git commit -m "Telegram fetch ${{ github.event.inputs.run_id }}"
          git push origin "${BRANCH_NAME}"
          
          echo "✅ Created branch: ${BRANCH_NAME}"