name: Telegram Channel Fetcher

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Comma-separated Telegram channel URLs'
        required: true
        type: string
      run_id:
        description: 'Unique run ID for this fetch'
        required: true
        type: string
      history:
        description: 'JSON string of already sent message IDs per channel'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  fetch-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-telegram-bs4
          restore-keys: |
            ${{ runner.os }}-pip-telegram-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      # Write the fetcher script to a file so we avoid heredoc indentation
      # issues and get proper Python syntax highlighting / error messages.
      - name: Write fetcher script
        run: |
          cat > fetch_telegram.py << 'PYEOF'
import os
import sys
import json
import re
import time
import copy
import requests
from bs4 import BeautifulSoup, NavigableString, Tag
from pathlib import Path
from datetime import datetime, timezone, timedelta
from concurrent.futures import ThreadPoolExecutor, as_completed

# ============================================================================
# Configuration
# ============================================================================

CHANNELS    = [u.strip() for u in os.environ.get("INPUT_CHANNELS", "").split(",") if u.strip()]
RUN_ID      = os.environ.get("INPUT_RUN_ID", "unknown")
HISTORY_JSON = os.environ.get("INPUT_HISTORY", "{}")
OUTPUT_DIR  = Path(f"downloads/run_{RUN_ID}")

# BUG FIX: TEHRAN_OFFSET must be a timedelta, not a timezone object.
# The old code did `dt.astimezone(timezone.utc) + TEHRAN_TZ` where TEHRAN_TZ
# was a timezone object — you cannot add a timezone to a datetime.
TEHRAN_OFFSET = timedelta(hours=3, minutes=30)

MAX_WORKERS          = 2          # parallel channel requests
REQUEST_DELAY        = 1.0        # seconds between sequential requests per worker
MAX_FILE_SIZE_MB     = 50
MAX_FILE_SIZE_BYTES  = MAX_FILE_SIZE_MB * 1024 * 1024
MAX_PHOTOS_PER_MSG   = 5

HEADERS = {
    "User-Agent": (
        "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
        "AppleWebKit/537.36 (KHTML, like Gecko) "
        "Chrome/134.0.0.0 Safari/537.36"
    )
}

OUTPUT_DIR.mkdir(parents=True, exist_ok=True)
media_dir = OUTPUT_DIR / "media"
media_dir.mkdir(exist_ok=True)

# BUG FIX: convert history lists to sets for O(1) membership checks.
try:
    raw_history = json.loads(HISTORY_JSON) if HISTORY_JSON else {}
except json.JSONDecodeError:
    print("⚠️  Could not parse HISTORY_JSON — starting with empty history.")
    raw_history = {}
sent_history: dict[str, set[str]] = {
    url: set(ids) for url, ids in raw_history.items()
}

# ============================================================================
# Regex (compiled once, same as tele2matrix app.py)
# ============================================================================

RE_MSG_ID       = re.compile(r'/(\d+)$')
RE_BG_IMAGE_URL = re.compile(r"background-image:url\('([^']+)'\)")
RE_TIME         = re.compile(r'(\d{1,2}:\d{2})')
RE_DATA_POST_ID = re.compile(r'(\d+)$')

# ============================================================================
# HTML → Markdown (EXACT mirror of app.py _process_message_element)
# ============================================================================

INLINE_FORMAT = {
    'b':      ('**', '**'),
    'strong': ('**', '**'),
    'i':      ('*',  '*'),
    'em':     ('*',  '*'),
    'code':   ('`',  '`'),
}


def _process_message_element(content) -> str:
    """
    Convert a single BeautifulSoup child node to Markdown.
    Exact mirror of app.py _process_message_element so formatting is identical.
    """
    # BUG FIX: NavigableString (plain text nodes) must be handled FIRST.
    # The old code relied on `content.name` checks which are all None for
    # NavigableString, then fell through to `content.string` — but the real
    # issue was that `html_to_markdown` passed the OUTER wrapper div to this
    # function, so it always returned '' and all message text was lost.
    if isinstance(content, NavigableString):
        return str(content)  # preserve whitespace exactly as-is

    if not isinstance(content, Tag):
        return ''

    if content.name == 'a':
        text = content.get_text(strip=True)
        href = content.get('href', '')
        return f'[{text}]({href})'

    if content.name == 'br':
        return '  \n'

    if content.name == 'pre':
        code = content.get_text(separator='\n', strip=True)
        return f'```\n{code}\n```'

    # Telegram emoji <i class="emoji"><b>🛢</b></i> — return the visible glyph
    if content.name == 'i' and 'emoji' in (content.get('class') or []):
        return content.get_text(strip=True)

    if content.name in INLINE_FORMAT:
        open_md, close_md = INLINE_FORMAT[content.name]
        return f'{open_md}{content.get_text(strip=True)}{close_md}'

    if content.name == 'blockquote':
        parts = [_process_message_element(child) for child in content.children]
        inner = ''.join(parts)
        lines = inner.split('  \n')
        quoted = '\n'.join(f'> {line}' if line.strip() else '>' for line in lines)
        return '\n' + quoted + '\n'

    # Generic fallback — iterate children so nested structure is not lost
    if content.children:
        return ''.join(_process_message_element(c) for c in content.children)

    if content.string:
        return content.string

    return ''


def _children_to_markdown(element) -> str:
    """Iterate the CHILDREN of a parsed element and join their Markdown."""
    return ''.join(_process_message_element(child) for child in element.children)

# ============================================================================
# Message ID extraction (same as app.py)
# ============================================================================

def extract_message_id(wrap) -> str | None:
    try:
        link = wrap.find('a', class_='tgme_widget_message_date')
        if link and link.get('href'):
            m = RE_MSG_ID.search(link['href'])
            if m:
                return m.group(1)
        data_post = wrap.get('data-post', '')
        if data_post:
            m = RE_DATA_POST_ID.search(data_post)
            if m:
                return m.group(1)
    except Exception:
        pass
    return None

# ============================================================================
# Timestamp extraction (same as app.py, with TEHRAN_OFFSET fix)
# ============================================================================

def extract_timestamp(bubble) -> str | None:
    try:
        time_el = bubble.find('time', class_='time')
        if time_el and time_el.get('datetime'):
            dt = datetime.fromisoformat(time_el['datetime'].replace('Z', '+00:00'))
            # BUG FIX: use astimezone(utc) then add timedelta, matching app.py exactly.
            tehran_dt = dt.astimezone(timezone.utc) + TEHRAN_OFFSET
            return tehran_dt.strftime('%H:%M')
        footer = bubble.find('div', class_='tgme_widget_message_footer')
        if footer:
            m = RE_TIME.search(footer.get_text())
            if m:
                return m.group(1)
    except Exception:
        pass
    return None

# ============================================================================
# Content extraction (EXACT mirror of app.py scrape_telegram_channel logic)
# ============================================================================

def extract_message_content(bubble) -> str:
    """
    Extract and convert message HTML content to Markdown.
    Mirrors app.py scrape_telegram_channel exactly so output is identical.

    BUG FIX: The original workflow code called html_to_markdown(raw_html_string)
    which re-parsed the HTML and called _process_message_element on the outer
    <div> wrapper. That div has name='div' which matches no format rule, so it
    returned '' — all message text was silently dropped.

    The fix: work directly on the BeautifulSoup element tree (not re-parsed HTML)
    and iterate text_el.children, exactly as app.py does.
    """
    # Deep-copy so we can safely mutate without affecting media extraction
    bubble = copy.deepcopy(bubble)

    # Strip reactions and footer before further parsing
    for cls in ('tgme_widget_message_reactions', 'tgme_widget_message_footer'):
        el = bubble.find('div', class_=cls)
        if el:
            el.decompose()

    # Reply quote
    reply_content = ''
    reply_el = bubble.find('a', class_='tgme_widget_message_reply')
    if reply_el:
        reply_text = reply_el.get_text(separator='\n', strip=True)
        reply_content = '> ' + reply_text.replace('\n', '\n> ') + '\n\n'
        reply_el.decompose()

    # Main message text (mirrors grouped-message handling in app.py)
    grouped = bubble.find('div', class_='tgme_widget_message_grouped_wrap')
    if grouped:
        text_el = None
        for sibling in grouped.find_next_siblings('div'):
            if 'tgme_widget_message_text' in sibling.get('class', []):
                text_el = sibling
                break
    else:
        text_el = bubble.find('div', class_='tgme_widget_message_text')

    if text_el:
        # Unwrap duplicate nested text div if present
        inner = text_el.find('div', class_='tgme_widget_message_text')
        if inner:
            text_el = inner
        # Iterate CHILDREN directly — same as app.py
        message_content = _children_to_markdown(text_el)
    else:
        message_content = '' if grouped else bubble.get_text(separator='\n', strip=True)

    return reply_content + message_content

# ============================================================================
# Media download
# ============================================================================

def download_media(url: str, filepath: Path, media_type: str) -> tuple[bool, int]:
    try:
        head = requests.head(url, timeout=30, headers=HEADERS, allow_redirects=True)
        content_length = int(head.headers.get('content-length', 0))
        if content_length > MAX_FILE_SIZE_BYTES:
            print(f"      ⚠️  {media_type} too large ({content_length / 1024 / 1024:.1f} MB > {MAX_FILE_SIZE_MB} MB limit)")
            return False, 0

        resp = requests.get(url, timeout=120, stream=True, headers=HEADERS)
        resp.raise_for_status()

        written = 0
        with open(filepath, 'wb') as f:
            for chunk in resp.iter_content(chunk_size=65536):
                f.write(chunk)
                written += len(chunk)
                if written > MAX_FILE_SIZE_BYTES:
                    print(f"      ⚠️  {media_type} exceeded size limit during download")
                    filepath.unlink(missing_ok=True)
                    return False, 0

        return True, written
    except Exception as e:
        print(f"      ❌ Download failed ({media_type}): {e}")
        filepath.unlink(missing_ok=True)
        return False, 0

# ============================================================================
# Fetch single channel
# ============================================================================

def fetch_channel(channel_url: str) -> list[dict]:
    channel_url = channel_url.strip()
    if not channel_url:
        return []

    channel_name = channel_url.rstrip('/').split('/')[-1]
    print(f"\n📡 Fetching: {channel_name}")

    sent_ids: set[str] = sent_history.get(channel_url, set())

    try:
        resp = requests.get(channel_url, headers=HEADERS, timeout=30)
        resp.raise_for_status()
    except Exception as e:
        print(f"  ❌ HTTP error: {e}")
        return []

    soup = BeautifulSoup(resp.text, 'lxml')
    channel_history = soup.find('section', class_='tgme_channel_history')
    if not channel_history:
        print(f"  ⚠️  No history section found")
        return []

    wraps = channel_history.find_all('div', class_='tgme_widget_message_wrap')
    print(f"  Found {len(wraps)} messages on page")

    channel_messages: list[dict] = []
    new_count = 0

    # BUG FIX: iterate newest-to-oldest (reversed DOM order) so we can stop
    # as soon as we hit a known ID.  Messages are collected in that order then
    # reversed below so they are sent oldest-first (chronological).
    for wrap in reversed(wraps):
        bubble = wrap.find('div', class_='tgme_widget_message_bubble')
        if not bubble:
            continue

        msg_id = extract_message_id(wrap)
        if not msg_id:
            continue

        if msg_id in sent_ids:
            print(f"  ⏹  Hit known message {msg_id} — stopping (found {new_count} new)")
            break

        timestamp = extract_timestamp(bubble)
        message_content = extract_message_content(bubble)

        # --- Photo extraction ---
        photo_wraps = bubble.find_all('a', class_='tgme_widget_message_photo_wrap')
        photo_urls: list[str] = []
        telegram_post_link: str | None = None
        for pw in photo_wraps:
            style = pw.get('style', '')
            m = RE_BG_IMAGE_URL.search(style)
            if m:
                photo_urls.append(m.group(1))
            if telegram_post_link is None:
                telegram_post_link = pw.get('href')

        # --- Video extraction ---
        video_url: str | None = None
        video_thumb_url: str | None = None
        video_el = bubble.find('video', class_='tgme_widget_message_video') or bubble.find('video')
        if video_el and video_el.get('src'):
            video_url = video_el['src']
            video_player = bubble.find('a', class_='tgme_widget_message_video_player')
            if video_player:
                telegram_post_link = video_player.get('href')
            thumb_el = bubble.find('i', class_='tgme_widget_message_video_thumb')
            if thumb_el:
                m = RE_BG_IMAGE_URL.search(thumb_el.get('style', ''))
                if m:
                    video_thumb_url = m.group(1)

        # --- Download media ---
        downloaded_media: list[dict] = []

        for i, url in enumerate(photo_urls[:MAX_PHOTOS_PER_MSG]):
            filename = f"{channel_name}_{msg_id}_photo_{i}.jpg"
            filepath = media_dir / filename
            success, size = download_media(url, filepath, "photo")
            if success:
                downloaded_media.append({'type': 'photo', 'filename': filename, 'size': size})
                print(f"    📸 Photo {i + 1} downloaded ({size / 1024:.0f} KB)")

        if video_url:
            filename = f"{channel_name}_{msg_id}_video.mp4"
            filepath = media_dir / filename
            success, size = download_media(video_url, filepath, "video")
            if success:
                downloaded_media.append({'type': 'video', 'filename': filename, 'size': size})
                print(f"    🎥 Video downloaded ({size / 1024 / 1024:.1f} MB)")
            elif video_thumb_url:
                # Fallback: download thumbnail so the bot can still send something visual
                thumb_filename = f"{channel_name}_{msg_id}_thumb.jpg"
                thumb_path = media_dir / thumb_filename
                t_ok, t_size = download_media(video_thumb_url, thumb_path, "video_thumb")
                if t_ok:
                    downloaded_media.append({'type': 'video_thumb', 'filename': thumb_filename, 'size': t_size})
                    print(f"    🖼  Video thumbnail downloaded as fallback")

        message_data = {
            'message_id':       msg_id,
            'channel':          channel_name,
            'channel_url':      channel_url,
            'content':          message_content,
            'timestamp':        timestamp,
            'photo_url':        photo_urls[0] if photo_urls else None,
            'photo_count':      len(photo_urls),
            'video_url':        video_url,
            'video_thumb_url':  video_thumb_url,
            'telegram_post_link': telegram_post_link,
            'downloaded_media': downloaded_media,
            'fetched_at':       datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
        }

        msg_file = OUTPUT_DIR / f"{channel_name}_{msg_id}.json"
        with open(msg_file, 'w', encoding='utf-8') as f:
            json.dump(message_data, f, indent=2, ensure_ascii=False)

        channel_messages.append(message_data)
        new_count += 1
        preview = message_content[:60].replace('\n', ' ')
        print(f"  \u2705 {msg_id}: {len(message_content)} chars, {len(downloaded_media)} media \u2014 [{preview}]")

        time.sleep(REQUEST_DELAY)

    # BUG FIX: reverse so messages are in chronological order (oldest first)
    # for correct send order on the bot side.
    channel_messages.reverse()
    print(f"  → {new_count} new message(s) from {channel_name}")
    return channel_messages


# ============================================================================
# Parallel fetch across channels
# ============================================================================

all_messages: list[dict] = []

with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
    futures = {executor.submit(fetch_channel, url): url for url in CHANNELS}
    for future in as_completed(futures):
        url = futures[future]
        try:
            all_messages.extend(future.result())
        except Exception as e:
            print(f"❌ Exception fetching {url}: {e}")
            import traceback; traceback.print_exc()

summary = {
    'run_id':         RUN_ID,
    'fetched_at':     datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    'total_messages': len(all_messages),
    'channels':       list({m['channel'] for m in all_messages}),
}
with open(OUTPUT_DIR / 'summary.json', 'w', encoding='utf-8') as f:
    json.dump(summary, f, indent=2)

print(f"\n📊 Summary: {len(all_messages)} new message(s) across {len(summary['channels'])} channel(s)")

# Write to GITHUB_OUTPUT
gh_output = os.environ.get('GITHUB_OUTPUT', '')
if gh_output:
    with open(gh_output, 'a') as f:
        f.write(f"message_count={len(all_messages)}\n")
PYEOF

      - name: Fetch Telegram messages and convert to Markdown
        run: python3 fetch_telegram.py
        env:
          INPUT_CHANNELS: ${{ github.event.inputs.channels }}
          INPUT_RUN_ID:   ${{ github.event.inputs.run_id }}
          INPUT_HISTORY:  ${{ github.event.inputs.history }}

      - name: Create temporary branch with results
        run: |
          BRANCH_NAME="temp-run-${{ github.event.inputs.run_id }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"

          git config user.name  "github-actions[bot]"
          # BUG FIX: was `git config.user.email` (dot instead of space) which
          # crashed the step silently, leaving no author identity for the commit.
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "${BRANCH_NAME}"
          # Remove everything tracked on the current HEAD so the orphan branch
          # only contains the downloads folder.
          git rm -rf . 2>/dev/null || true

          if [ -d "downloads" ]; then
            git add downloads/
            git commit -m "Telegram fetch ${{ github.event.inputs.run_id }}"
            git push origin "${BRANCH_NAME}"
            echo "✅ Created branch: ${BRANCH_NAME}"
          else
            echo "⚠️  No downloads directory — nothing to push. Pushing empty sentinel commit."
            git commit --allow-empty -m "No new messages ${{ github.event.inputs.run_id }}"
            git push origin "${BRANCH_NAME}"
          fi
